version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - revive
    - exhaustive
    - noctx
    - bodyclose
    - contextcheck

linters-settings:
  goimports:
    local-prefixes: github.com/stainedhead/go-tahu-okf-semantic-mcp
  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: context-as-argument
      - name: context-keys-type

issues:
  exclude-dirs:
    - vendor
    - testdata

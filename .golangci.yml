version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - exhaustive
    - noctx
    - bodyclose
    - contextcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/stainedhead/go-tahu-okf-semantic-mcp

linters-settings:
  revive:
    rules:
      - name: exported
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: context-as-argument
      - name: context-keys-type

issues:
  exclude-dirs:
    - vendor
    - testdata

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check (gofmt)
        run: |
          bad=$(gofmt -l .)
          if [ -n "$bad" ]; then
            printf 'Unformatted files:\n%s\nRun: gofmt -w .\n' "$bad"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@7119f3d5ddced62a10a044847a6c6bb0f7a5e76a # v7.0.0
        with:
          version: v2.12.2

      - name: Test (race detector)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage gate — domain (≥90%)
        run: |
          go test -coverprofile=domain.out ./internal/domain/...
          pct=$(go tool cover -func=domain.out | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 90) { print "FAIL: domain coverage " p "% is below 90%"; exit 1 }
            print "PASS: domain coverage " p "%"
          }'

      - name: Coverage gate — usecase (≥90%)
        run: |
          go test -coverprofile=usecase.out ./internal/usecase/...
          pct=$(go tool cover -func=usecase.out | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 90) { print "FAIL: usecase coverage " p "% is below 90%"; exit 1 }
            print "PASS: usecase coverage " p "%"
          }'

      - name: Coverage gate — infra/config (≥80%)
        run: |
          go test -coverprofile=config.out ./internal/infra/config/...
          pct=$(go tool cover -func=config.out | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 80) { print "FAIL: infra/config coverage " p "% is below 80%"; exit 1 }
            print "PASS: infra/config coverage " p "%"
          }'

      - name: Coverage gate — infra/registry (≥80%)
        run: |
          go test -coverprofile=registry.out ./internal/infra/registry/...
          pct=$(go tool cover -func=registry.out | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 80) { print "FAIL: infra/registry coverage " p "% is below 80%"; exit 1 }
            print "PASS: infra/registry coverage " p "%"
          }'

      - name: Coverage gate — infra/transport (≥60%)
        run: |
          go test -coverprofile=transport.out ./internal/infra/transport/...
          pct=$(go tool cover -func=transport.out | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 60) { print "FAIL: infra/transport coverage " p "% is below 60%"; exit 1 }
            print "PASS: infra/transport coverage " p "%"
          }'

      - name: Coverage gate — adapter/okf (≥70%)
        run: |
          go test -coverprofile=okf.out ./internal/adapter/okf/...
          pct=$(go tool cover -func=okf.out | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 70) { print "FAIL: adapter/okf coverage " p "% is below 70%"; exit 1 }
            print "PASS: adapter/okf coverage " p "%"
          }'

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration tests
        run: go test -tags integration -race ./...
